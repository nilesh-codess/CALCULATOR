<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StaffHub — Employee Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f2ed;
  --ink:#1a1714;
  --surface:#ffffff;
  --surface2:#efece7;
  --border:#ddd8d0;
  --border2:#c8c2b8;
  --accent:#2d5a3d;
  --accent2:#4a8c60;
  --muted:#8a8278;
  --radius:14px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 8px 24px rgba(0,0,0,0.07);
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

/* HEADER */
.header{background:var(--ink);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:72px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:#fff;letter-spacing:-0.5px;display:flex;align-items:center;gap:10px;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:#4a8c60;}
.hstat{font-size:12px;color:rgba(255,255,255,0.45);padding:6px 14px;border:1px solid rgba(255,255,255,0.1);border-radius:20px;margin-left:8px;}
.hstat strong{color:rgba(255,255,255,0.85);font-weight:500;}
.add-btn{background:#4a8c60;color:#fff;border:none;border-radius:10px;padding:9px 20px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;white-space:nowrap;margin-left:12px;}
.add-btn:hover{background:#2d5a3d;}

/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:36px 32px 80px;}

/* HERO */
.hero{margin-bottom:32px;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:700;color:var(--ink);letter-spacing:-1.5px;line-height:1;}
.hero-title span{color:#4a8c60;font-style:italic;}
.hero-sub{font-size:13px;color:var(--muted);margin-top:6px;}
.hero-credit{font-size:13px;color:#4a8c60;font-weight:600;margin-top:4px;}

/* CONTROLS */
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;align-items:center;}
.search-box{flex:1;min-width:220px;display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s;}
.search-box:focus-within{border-color:#4a8c60;}
.search-box input{flex:1;border:none;outline:none;padding:11px 14px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);background:transparent;}
.search-box input::placeholder{color:var(--muted);}

.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap;}
.chip:hover{border-color:var(--border2);color:var(--ink);}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}

/* META */
.meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.rcount{font-size:13px;color:var(--muted);}
.rcount strong{color:var(--ink);}
.sort-sel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-family:'Outfit',sans-serif;font-size:12px;color:var(--muted);outline:none;cursor:pointer;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s,border-color .2s;position:relative;overflow:hidden;animation:cardIn .3s ease both;}
@keyframes cardIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.card:hover{transform:translateY(-3px);box-shadow:0 4px 8px rgba(0,0,0,0.06),0 16px 40px rgba(0,0,0,0.1);border-color:var(--border2);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--dclr,#4a8c60);}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.avatar{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;background:var(--dclr,#4a8c60);}
.card-btns{display:flex;gap:6px;}
.ibtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .12s;color:var(--muted);}
.ibtn:hover{background:var(--surface2);border-color:var(--border2);}
.del-btn:hover{background:#fee2e2!important;color:#991b1b!important;border-color:#fca5a5!important;}

.emp-name{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700;color:var(--ink);margin-bottom:2px;line-height:1.2;}
.emp-role{font-size:12px;color:var(--muted);margin-bottom:12px;}
.dept-pill{display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;padding:3px 10px;border-radius:20px;margin-bottom:12px;border:1px solid;}

.info-list{display:flex;flex-direction:column;gap:7px;}
.info-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);}
.info-ico{width:16px;text-align:center;flex-shrink:0;font-size:12px;}
.info-row a{color:#4a8c60;text-decoration:none;}
.info-row a:hover{text-decoration:underline;}

.card-foot{margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.emp-id{font-size:11px;color:var(--muted);font-family:monospace;}
.status-wrap{display:flex;align-items:center;gap:5px;}
.sdot{width:7px;height:7px;border-radius:50%;}
.slbl{font-size:11px;color:var(--muted);}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;grid-column:1/-1;color:var(--muted);}
.empty-sym{font-family:'Cormorant Garamond',serif;font-size:72px;color:var(--border2);margin-bottom:12px;}

/* MODAL OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(26,23,20,.55);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;animation:fIn .2s ease;}
@keyframes fIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--surface);border-radius:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:sUp .25s cubic-bezier(.34,1.2,.64,1);}
@keyframes sUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-head{padding:28px 28px 0;display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;letter-spacing:-.5px;}
.mclose{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:16px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;}
.mclose:hover{background:var(--surface2);color:var(--ink);}
.modal-body{padding:0 28px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
.field input,.field select{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 13px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s;}
.field input:focus,.field select:focus{border-color:#4a8c60;}
.field input::placeholder{color:#bbb;}
.modal-foot{padding:16px 28px 24px;display:flex;gap:10px;}
.mbtn{flex:1;padding:12px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:none;}
.mbtn-cancel{background:var(--surface2);color:var(--muted);border:1px solid var(--border)!important;}
.mbtn-cancel:hover{color:var(--ink);}
.mbtn-save{background:var(--ink);color:#fff;}
.mbtn-save:hover{background:#2d2a26;}

/* CONFIRM BOX */
.confirm-overlay{position:fixed;inset:0;background:rgba(26,23,20,.65);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
.confirm-box{background:var(--surface);border-radius:16px;padding:28px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.confirm-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;margin-bottom:10px;color:var(--ink);}
.confirm-msg{font-size:14px;color:var(--muted);margin-bottom:22px;line-height:1.5;}
.confirm-btns{display:flex;gap:10px;}
.cbtn{flex:1;padding:11px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;border:none;font-weight:500;transition:all .15s;}
.cbtn-no{background:var(--surface2);color:var(--muted);border:1px solid var(--border)!important;}
.cbtn-no:hover{color:var(--ink);}
.cbtn-yes{background:#991b1b;color:#fff;}
.cbtn-yes:hover{background:#7f1d1d;}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:600px){
  .header{padding:0 16px;}
  .main{padding:24px 16px 60px;}
  .hero-title{font-size:38px;}
  .fgrid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo"><div class="logo-dot"></div>StaffHub</div>
  <div style="display:flex;align-items:center;flex-wrap:wrap;">
    <span class="hstat">Employees: <strong id="hCount">0</strong></span>
    <span class="hstat">Departments: <strong id="hDepts">0</strong></span>
    <button class="add-btn" id="addBtn">+ Add Employee</button>
  </div>
</header>

<div class="main">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-title">Employee<br><span>Directory</span></div>
    <div class="hero-sub">Saare employees ek jagah — search, filter, manage</div>
    <div class="hero-credit">✨ Banaya hai: Nilesh Kumar — BCA Student</div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍  Naam, role, email se search karo..."/>
    </div>
    <div class="chips" id="chipBar"></div>
  </div>

  <!-- META -->
  <div class="meta">
    <div class="rcount" id="rcount"></div>
    <select class="sort-sel" id="sortSel">
      <option value="name">Naam se sort</option>
      <option value="dept">Department se</option>
      <option value="new">Naye pehle</option>
    </select>
  </div>

  <!-- GRID -->
  <div class="grid" id="empGrid"></div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="modal" style="display:none;">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">Naya Employee</div>
      <button class="mclose" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="fgrid">
        <div class="field">
          <label>Pehla Naam *</label>
          <input type="text" id="fFirst" placeholder="Pehla naam" autocomplete="new-password"/>
        </div>
        <div class="field">
          <label>Akhri Naam *</label>
          <input type="text" id="fLast" placeholder="Akhri naam" autocomplete="new-password"/>
        </div>
        <div class="field">
          <label>Job Title *</label>
          <input type="text" id="fRole" placeholder="Designation" autocomplete="new-password"/>
        </div>
        <div class="field">
          <label>Department *</label>
          <select id="fDept">
            <option value="">-- Select karo --</option>
            <option>Engineering</option>
            <option>Design</option>
            <option>Marketing</option>
            <option>HR</option>
            <option>Finance</option>
            <option>Operations</option>
            <option>Sales</option>
            <option>IT</option>
          </select>
        </div>
        <div class="field">
          <label>Email *</label>
          <input type="text" id="fEmail" placeholder="email@company.com" autocomplete="new-password"/>
        </div>
        <div class="field">
          <label>Phone</label>
          <input type="text" id="fPhone" placeholder="+91 XXXXX XXXXX" autocomplete="new-password"/>
        </div>
        <div class="field">
          <label>Location</label>
          <input type="text" id="fLoc" placeholder="Sheher, State" autocomplete="new-password"/>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="fStatus">
            <option value="active">Active</option>
            <option value="remote">Remote</option>
            <option value="leave">On Leave</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="mbtn mbtn-cancel" id="modalCancel">Cancel</button>
      <button class="mbtn mbtn-save" id="modalSave">✅ Save Karo</button>
    </div>
  </div>
</div>

<!-- CUSTOM CONFIRM -->
<div class="confirm-overlay" id="confirmBox" style="display:none;">
  <div class="confirm-box">
    <div class="confirm-title">Delete karna hai?</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-btns">
      <button class="cbtn cbtn-no" id="confirmNo">Nahi, Rakho</button>
      <button class="cbtn cbtn-yes" id="confirmYes">Haan, Delete Karo 🗑️</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ── DEPT COLOR MAP ── */
var DCLR = {
  Engineering:'#3b82f6', Design:'#8b5cf6', Marketing:'#f59e0b',
  HR:'#ec4899', Finance:'#10b981', Operations:'#f97316',
  Sales:'#06b6d4', IT:'#6366f1'
};
var STAT = {
  active:  {dot:'#22c55e', lbl:'Active'},
  remote:  {dot:'#f59e0b', lbl:'Remote'},
  leave:   {dot:'#94a3b8', lbl:'On Leave'}
};

/* ── STATE ── */
var employees = [];
var deptFilter = 'all';
var editId = null;
var pendingDeleteId = null;

/* ── LOAD from localStorage ── */
function load() {
  var raw = localStorage.getItem('staffhub_v2');
  if (raw) {
    try { employees = JSON.parse(raw); } catch(e){ employees = []; }
  }
  /* Only add sample data if localStorage is completely empty */
  if (employees.length === 0) {
    employees = [
      {id:'E001',first:'Priya',   last:'Sharma', role:'Senior Developer',  dept:'Engineering', email:'priya@company.com',   phone:'+91 98001 00001', loc:'Bangalore',  status:'active', ts:1},
      {id:'E002',first:'Rohan',   last:'Gupta',  role:'UI/UX Designer',    dept:'Design',       email:'rohan@company.com',   phone:'+91 98001 00002', loc:'Mumbai',     status:'active', ts:2},
      {id:'E003',first:'Ananya',  last:'Singh',  role:'Marketing Lead',    dept:'Marketing',    email:'ananya@company.com',  phone:'+91 98001 00003', loc:'Delhi',      status:'remote', ts:3},
      {id:'E004',first:'Karan',   last:'Mehta',  role:'HR Manager',        dept:'HR',           email:'karan@company.com',   phone:'+91 98001 00004', loc:'Pune',       status:'active', ts:4},
      {id:'E005',first:'Sneha',   last:'Patel',  role:'Finance Analyst',   dept:'Finance',      email:'sneha@company.com',   phone:'+91 98001 00005', loc:'Ahmedabad',  status:'active', ts:5},
      {id:'E006',first:'Arjun',   last:'Kumar',  role:'IT Support',        dept:'IT',           email:'arjun@company.com',   phone:'+91 98001 00006', loc:'Chennai',    status:'leave',  ts:6}
    ];
    saveData();
  }
}

function saveData() {
  localStorage.setItem('staffhub_v2', JSON.stringify(employees));
}

/* ── HELPERS ── */
function initials(e) { return (e.first.charAt(0) + e.last.charAt(0)).toUpperCase(); }
function dColor(dept) { return DCLR[dept] || '#64748b'; }
function genId() { return 'E' + Date.now().toString().slice(-6); }

/* ── CHIPS ── */
function buildChips() {
  var depts = ['all'];
  employees.forEach(function(e){ if (e.dept && depts.indexOf(e.dept) < 0) depts.push(e.dept); });
  var bar = document.getElementById('chipBar');
  bar.innerHTML = '';
  depts.forEach(function(d) {
    var b = document.createElement('button');
    b.className = 'chip' + (deptFilter === d ? ' on' : '');
    b.textContent = d === 'all' ? 'Sab' : d;
    b.addEventListener('click', function() { setDept(d); });
    bar.appendChild(b);
  });
}

function setDept(d) {
  deptFilter = d;
  buildChips();
  render();
}

/* ── RENDER CARDS ── */
function render() {
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  var sort = document.getElementById('sortSel').value;

  var list = employees.filter(function(e) {
    var mD = (deptFilter === 'all') || (e.dept === deptFilter);
    var mQ = !q || [e.first, e.last, e.role, e.dept, e.email, e.loc, e.phone].some(function(v) {
      return v && v.toLowerCase().indexOf(q) >= 0;
    });
    return mD && mQ;
  });

  if (sort === 'name') list.sort(function(a,b){ return (a.first+a.last).localeCompare(b.first+b.last); });
  else if (sort === 'dept') list.sort(function(a,b){ return a.dept.localeCompare(b.dept); });
  else list.sort(function(a,b){ return b.ts - a.ts; });

  document.getElementById('hCount').textContent = employees.length;
  document.getElementById('hDepts').textContent = (new Set(employees.map(function(e){return e.dept;}))).size;
  document.getElementById('rcount').innerHTML = '<strong>' + list.length + '</strong> employee dikh rahe hain';

  var grid = document.getElementById('empGrid');

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-sym">∅</div><p>Koi employee nahi mila</p></div>';
    return;
  }

  grid.innerHTML = '';
  list.forEach(function(e, i) {
    var col = dColor(e.dept);
    var st  = STAT[e.status] || STAT.active;
    var card = document.createElement('div');
    card.className = 'card';
    card.style.cssText = '--dclr:' + col + ';animation-delay:' + (i * 0.04) + 's';
    card.innerHTML =
      '<div class="card-top">' +
        '<div class="avatar">' + initials(e) + '</div>' +
        '<div class="card-btns">' +
          '<button class="ibtn edit-btn" data-id="' + e.id + '" title="Edit">✏️</button>' +
          '<button class="ibtn del-btn" data-id="' + e.id + '" title="Delete">🗑️</button>' +
        '</div>' +
      '</div>' +
      '<div class="emp-name">' + e.first + ' ' + e.last + '</div>' +
      '<div class="emp-role">' + e.role + '</div>' +
      '<div class="dept-pill" style="background:' + col + '18;color:' + col + ';border-color:' + col + '44">' + e.dept + '</div>' +
      '<div class="info-list">' +
        (e.email ? '<div class="info-row"><span class="info-ico">✉</span><a href="mailto:' + e.email + '">' + e.email + '</a></div>' : '') +
        (e.phone ? '<div class="info-row"><span class="info-ico">📞</span>' + e.phone + '</div>' : '') +
        (e.loc   ? '<div class="info-row"><span class="info-ico">📍</span>' + e.loc + '</div>' : '') +
      '</div>' +
      '<div class="card-foot">' +
        '<div class="emp-id">' + e.id + '</div>' +
        '<div class="status-wrap"><div class="sdot" style="background:' + st.dot + '"></div><div class="slbl">' + st.lbl + '</div></div>' +
      '</div>';

    /* Attach events directly to buttons */
    card.querySelector('.edit-btn').addEventListener('click', function() { openEdit(e.id); });
    card.querySelector('.del-btn').addEventListener('click', function() { askDelete(e.id); });

    grid.appendChild(card);
  });
}

/* ── MODAL OPEN/CLOSE ── */
function openAdd() {
  editId = null;
  document.getElementById('modalTitle').textContent = 'Naya Employee';
  /* Clear ALL fields explicitly */
  document.getElementById('fFirst').value  = '';
  document.getElementById('fLast').value   = '';
  document.getElementById('fRole').value   = '';
  document.getElementById('fEmail').value  = '';
  document.getElementById('fPhone').value  = '';
  document.getElementById('fLoc').value    = '';
  document.getElementById('fDept').value   = '';
  document.getElementById('fStatus').value = 'active';
  document.getElementById('modal').style.display = 'flex';
}

function openEdit(id) {
  var e = null;
  for (var i = 0; i < employees.length; i++) { if (employees[i].id === id) { e = employees[i]; break; } }
  if (!e) return;
  editId = id;
  document.getElementById('modalTitle').textContent = 'Employee Edit Karo';
  document.getElementById('fFirst').value  = e.first  || '';
  document.getElementById('fLast').value   = e.last   || '';
  document.getElementById('fRole').value   = e.role   || '';
  document.getElementById('fEmail').value  = e.email  || '';
  document.getElementById('fPhone').value  = e.phone  || '';
  document.getElementById('fLoc').value    = e.loc    || '';
  document.getElementById('fDept').value   = e.dept   || '';
  document.getElementById('fStatus').value = e.status || 'active';
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  editId = null;
}

/* ── SAVE ── */
function saveEmployee() {
  var first  = document.getElementById('fFirst').value.trim();
  var last   = document.getElementById('fLast').value.trim();
  var role   = document.getElementById('fRole').value.trim();
  var dept   = document.getElementById('fDept').value;
  var email  = document.getElementById('fEmail').value.trim();
  var phone  = document.getElementById('fPhone').value.trim();
  var loc    = document.getElementById('fLoc').value.trim();
  var status = document.getElementById('fStatus').value;

  if (!first) { showToast('❌ Pehla naam zaruri hai!', true); return; }
  if (!last)  { showToast('❌ Akhri naam zaruri hai!', true); return; }
  if (!role)  { showToast('❌ Job title zaruri hai!',  true); return; }
  if (!dept)  { showToast('❌ Department select karo!',true); return; }
  if (!email) { showToast('❌ Email zaruri hai!',      true); return; }

  if (editId) {
    for (var i = 0; i < employees.length; i++) {
      if (employees[i].id === editId) {
        employees[i].first  = first;
        employees[i].last   = last;
        employees[i].role   = role;
        employees[i].dept   = dept;
        employees[i].email  = email;
        employees[i].phone  = phone;
        employees[i].loc    = loc;
        employees[i].status = status;
        break;
      }
    }
    showToast('✅ Employee update ho gaya!');
  } else {
    employees.push({ id:genId(), first:first, last:last, role:role, dept:dept, email:email, phone:phone, loc:loc, status:status, ts:Date.now() });
    showToast('✅ Naya employee add ho gaya!');
  }

  saveData();
  closeModal();
  buildChips();
  render();
}

/* ── DELETE — custom confirm box (no window.confirm) ── */
function askDelete(id) {
  var e = null;
  for (var i = 0; i < employees.length; i++) { if (employees[i].id === id) { e = employees[i]; break; } }
  if (!e) return;
  pendingDeleteId = id;
  document.getElementById('confirmMsg').textContent = '"' + e.first + ' ' + e.last + '" ko hamesha ke liye delete karna chahte ho?';
  document.getElementById('confirmBox').style.display = 'flex';
}

function doDelete() {
  var newList = [];
  for (var i = 0; i < employees.length; i++) {
    if (employees[i].id !== pendingDeleteId) newList.push(employees[i]);
  }
  employees = newList;
  pendingDeleteId = null;
  document.getElementById('confirmBox').style.display = 'none';
  saveData();
  buildChips();
  render();
  showToast('🗑️ Employee delete ho gaya!');
}

/* ── TOAST ── */
function showToast(msg, isErr) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isErr ? '#991b1b' : '#1a1714';
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

/* ── WIRE UP BUTTONS ── */
document.getElementById('addBtn').addEventListener('click', openAdd);
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalSave').addEventListener('click', saveEmployee);
document.getElementById('confirmNo').addEventListener('click', function(){ document.getElementById('confirmBox').style.display='none'; pendingDeleteId=null; });
document.getElementById('confirmYes').addEventListener('click', doDelete);
document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('sortSel').addEventListener('change', render);

/* Close modal on overlay click */
document.getElementById('modal').addEventListener('click', function(ev){ if(ev.target===this) closeModal(); });

/* Escape key */
document.addEventListener('keydown', function(ev){ if(ev.key==='Escape'){ closeModal(); document.getElementById('confirmBox').style.display='none'; } });

/* ── START ── */
load();
buildChips();
render();
</script>
