<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | Aman Zaid</title>
    <style>
        :root {
            --bg: #F4E0AF;
            --accent-1: #FF90E8;
            --accent-2: #23A094;
            --accent-3: #FFD224;
            --accent-4: #92DAFF;
            --black: #000000;
        }

        body {
            background-color: var(--bg);
            font-family: 'Lexend', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .profile-img {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 4px solid var(--black);
            background: #fff url('https://api.dicebear.com/7.x/avataaars/svg?seed=Aman') no-repeat center;
            background-size: cover;
            margin: 0 auto 15px;
            box-shadow: 6px 6px 0px var(--black);
        }

        h1 { font-size: 24px; margin-bottom: 5px; text-transform: uppercase; }
        p { font-weight: 500; margin-bottom: 30px; }

        .link-item {
            display: block;
            text-decoration: none;
            color: var(--black);
            font-weight: 800;
            font-size: 18px;
            padding: 15px;
            margin-bottom: 20px;
            border: 3px solid var(--black);
            border-radius: 12px;
            transition: all 0.1s ease;
        }

        /* Working Colors & Shadows */
        .link-1 { background: var(--accent-1); box-shadow: 8px 8px 0px var(--black); }
        .link-2 { background: var(--accent-2); box-shadow: 8px 8px 0px var(--black); }
        .link-3 { background: var(--accent-3); box-shadow: 8px 8px 0px var(--black); }
        .link-4 { background: var(--accent-4); box-shadow: 8px 8px 0px var(--black); }

        .link-item:hover { transform: translate(2px, 2px); box-shadow: 4px 4px 0px var(--black); }
        .link-item:active { transform: translate(8px, 8px); box-shadow: 0px 0px 0px var(--black); }

        .footer { margin-top: 30px; font-weight: bold; font-size: 14px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="profile-img"></div>
        
        <h1>NILESH KUMAR</h1>
        <p>BCA Student & C Developer</p>

        <a href="https://github.com" target="_blank" class="link-item link-1">MY GITHUB REPOS</a>
        
        <a href="https://www.google.com/search?q=BCA+Computer+Fundamentals+Notes" target="_blank" class="link-item link-2">BCA STUDY RESOURCES</a>
        
        <a href="https://instagram.com" target="_blank" class="link-item link-3">FOLLOW ON INSTAGRAM</a>
        
        <a href="https://www.learn-c.org/" target="_blank" class="link-item link-4">C PROGRAMMING GUIDE</a>

        <div class="footer">DESIGNED BY NILESH KUMAR 🚀</div>
    </div>

</body>
</html>
