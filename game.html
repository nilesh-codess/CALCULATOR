<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Number Guessing Game 🎮</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            height: 100vh;
            display: flex; justify-content: center; align-items: center; margin: 0;
        }
        .game-card {
            background: white; padding: 40px; border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); text-align: center;
            width: 350px; border: 4px solid #ff6b6b;
        }
        h1 { color: #ff6b6b; font-size: 28px; }
        input {
            width: 80px; padding: 15px; font-size: 24px; border-radius: 12px;
            border: 2px solid #ddd; text-align: center; margin: 20px 0;
        }
        .btn {
            background: #ff6b6b; color: white; border: none;
            padding: 12px 30px; font-size: 18px; border-radius: 50px;
            cursor: pointer; font-weight: bold;
        }
        /* Message box ko hamesha dikhne wala banaya */
        #message {
            margin-top: 25px; font-size: 18px; font-weight: bold;
            padding: 15px; border-radius: 10px; min-height: 50px;
            background: #f9f9f9; border: 1px dashed #ccc;
        }
        .success { color: #2ecc71; background: #e8f8f0 !important; border: 1px solid #2ecc71 !important; }
        .hint { color: #3498db; background: #ebf5fb !important; border: 1px solid #3498db !important; }
    </style>
</head>
<body>

<div class="game-card">
    <h1>🎮 Guess It!</h1>
    <p>1 se 100 ke beech ka number pehchano!</p>
    
    <input type="number" id="userGuess" placeholder="?">
    <br>
    <button class="btn" onclick="checkGuess()">Check Kariye</button>

    <div id="message">Yahan hint aayegi...</div>
    
    <p style="margin-top: 20px;">Attempts: <span id="attempts">0</span></p>
    <button onclick="resetGame()" style="color:#3498db; cursor:pointer; background:none; border:none; text-decoration:underline;">Restart</button>
</div>

<script>
    let randomNumber = Math.floor(Math.random() * 100) + 1;
    let attempts = 0;

    function checkGuess() {
        let guessInput = document.getElementById('userGuess');
        let guess = parseInt(guessInput.value);
        let messageBox = document.getElementById('message');
        
        if (isNaN(guess)) {
            messageBox.innerText = "Kripya ek number likhein!";
            return;
        }

        attempts++;
        document.getElementById('attempts').innerText = attempts;

        if (guess === randomNumber) {
            messageBox.innerText = `🥳 Shabaash! ${randomNumber} hi tha!`;
            messageBox.className = "success";
        } else if (guess > randomNumber) {
            messageBox.innerText = "📉 Bahut bada hai! Thoda Chhota sochiye.";
            messageBox.className = "hint";
        } else {
            messageBox.innerText = "📈 Bahut chhota hai! Thoda Bada sochiye.";
            messageBox.className = "hint";
        }
    }

    function resetGame() {
        randomNumber = Math.floor(Math.random() * 100) + 1;
        attempts = 0;
        document.getElementById('attempts').innerText = "0";
        document.getElementById('message').innerText = "Naya game shuru! Guess karo.";
        document.getElementById('message').className = "";
        document.getElementById('userGuess').value = "";
    }
</script>

</body>
</html>
