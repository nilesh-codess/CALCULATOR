<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CS Quiz Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090f;
      --surface: #12121a;
      --surface2: #1c1c28;
      --border: #252535;
      --accent: #a78bfa;
      --accent2: #c4b5fd;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #f1f0ff;
      --muted: #6b6b8a;
      --radius: 18px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -150px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 500px;
      background: radial-gradient(ellipse, rgba(167,139,250,0.08) 0%, transparent 65%);
      pointer-events: none;
    }

    .wrapper { width: 100%; max-width: 580px; position: relative; z-index: 1; }

    /* ── SCREEN BASE ── */
    .screen { display: none; animation: fadeUp 0.4s ease; }
    .screen.active { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HOME SCREEN ── */
    .home-icon { font-size: 72px; text-align: center; margin-bottom: 16px; }
    .home-title {
      font-family: 'Syne', sans-serif;
      font-size: 44px; font-weight: 800;
      letter-spacing: -2px; text-align: center;
      line-height: 1.1; margin-bottom: 8px;
    }
    .home-title span { color: var(--accent); }
    .home-sub { text-align: center; color: var(--muted); font-size: 15px; margin-bottom: 32px; }

    .info-chips {
      display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 32px;
    }
    .chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 7px 18px; font-size: 13px; color: var(--muted);
    }
    .chip span { color: var(--accent2); font-weight: 500; }

    .start-btn {
      display: block; width: 100%;
      background: var(--accent); color: #09090f;
      border: none; border-radius: var(--radius);
      padding: 18px; font-family: 'Syne', sans-serif;
      font-size: 18px; font-weight: 800;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s;
      letter-spacing: -0.5px;
    }
    .start-btn:hover { opacity: 0.88; }
    .start-btn:active { transform: scale(0.98); }

    /* ── QUIZ SCREEN ── */
    .quiz-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .q-counter {
      font-family: 'Syne', sans-serif;
      font-size: 13px; color: var(--muted);
    }
    .q-counter span { color: var(--accent); font-size: 20px; font-weight: 700; }

    .score-pill {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 16px;
      font-size: 13px; color: var(--muted);
    }
    .score-pill b { color: var(--green); }

    /* Progress bar */
    .progress-track {
      height: 4px; background: var(--surface2);
      border-radius: 4px; margin-bottom: 28px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent);
      border-radius: 4px; transition: width 0.4s ease;
    }

    /* Timer */
    .timer-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .timer-track {
      flex: 1; height: 6px; background: var(--surface2);
      border-radius: 6px; overflow: hidden;
    }
    .timer-fill {
      height: 100%; width: 100%; border-radius: 6px;
      transition: width 0.1s linear, background 0.3s;
      background: var(--green);
    }
    .timer-fill.warn { background: var(--yellow); }
    .timer-fill.danger { background: var(--red); }
    .timer-label {
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700; min-width: 28px;
      text-align: right; color: var(--muted);
    }
    .timer-label.danger { color: var(--red); }

    /* Category badge */
    .cat-badge {
      display: inline-block; margin-bottom: 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 4px 14px;
      font-size: 11px; color: var(--accent2); letter-spacing: 0.5px;
    }

    /* Question */
    .question-text {
      font-family: 'Syne', sans-serif;
      font-size: 22px; font-weight: 700;
      line-height: 1.35; margin-bottom: 28px;
      letter-spacing: -0.5px;
    }

    /* Options */
    .options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

    .opt-btn {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px;
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      color: var(--text); cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      text-align: left; width: 100%;
    }
    .opt-btn:hover:not(:disabled) {
      border-color: var(--accent); background: var(--surface2);
    }
    .opt-btn:active:not(:disabled) { transform: scale(0.99); }

    .opt-label {
      width: 32px; height: 32px; border-radius: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      flex-shrink: 0; transition: all 0.15s;
    }

    .opt-btn.correct {
      border-color: var(--green); background: rgba(74,222,128,0.08);
    }
    .opt-btn.correct .opt-label {
      background: var(--green); color: #09090f; border-color: var(--green);
    }
    .opt-btn.wrong {
      border-color: var(--red); background: rgba(248,113,113,0.08);
    }
    .opt-btn.wrong .opt-label {
      background: var(--red); color: #09090f; border-color: var(--red);
    }
    .opt-btn:disabled { cursor: default; }

    /* Explanation */
    .explanation {
      background: var(--surface2); border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 12px; padding: 14px 16px;
      font-size: 14px; color: var(--muted); line-height: 1.6;
      display: none; margin-bottom: 20px;
      animation: fadeUp 0.3s ease;
    }
    .explanation.show { display: block; }
    .explanation strong { color: var(--accent2); }

    /* Next btn */
    .next-btn {
      width: 100%; background: var(--accent); color: #09090f;
      border: none; border-radius: var(--radius);
      padding: 16px; font-family: 'Syne', sans-serif;
      font-size: 16px; font-weight: 800;
      cursor: pointer; transition: opacity 0.15s;
      display: none;
    }
    .next-btn.show { display: block; }
    .next-btn:hover { opacity: 0.85; }

    /* ── RESULT SCREEN ── */
    .result-icon { font-size: 72px; text-align: center; margin-bottom: 16px; }
    .result-title {
      font-family: 'Syne', sans-serif;
      font-size: 36px; font-weight: 800;
      text-align: center; letter-spacing: -1.5px;
      margin-bottom: 6px;
    }
    .result-sub { text-align: center; color: var(--muted); font-size: 15px; margin-bottom: 28px; }

    .score-display {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px;
      text-align: center; margin-bottom: 20px;
    }
    .score-num {
      font-family: 'Syne', sans-serif;
      font-size: 72px; font-weight: 800;
      letter-spacing: -3px; line-height: 1;
    }
    .score-denom { font-size: 28px; color: var(--muted); font-family: 'Syne', sans-serif; }
    .score-pct { font-size: 18px; color: var(--accent2); margin-top: 8px; }

    .stats-row {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 10px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 12px; text-align: center;
    }
    .stat-card .stat-icon { font-size: 24px; margin-bottom: 6px; }
    .stat-card .stat-val {
      font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700;
    }
    .stat-card .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .grade-bar {
      background: var(--surface2); border-radius: 8px;
      padding: 14px 20px; margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .grade-label { font-size: 14px; color: var(--muted); }
    .grade-val { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }

    .replay-btn {
      display: block; width: 100%;
      background: var(--accent); color: #09090f;
      border: none; border-radius: var(--radius);
      padding: 18px; font-family: 'Syne', sans-serif;
      font-size: 18px; font-weight: 800;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s;
      letter-spacing: -0.5px; margin-bottom: 12px;
    }
    .replay-btn:hover { opacity: 0.88; }

    .review-btn {
      display: block; width: 100%;
      background: transparent; color: var(--muted);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px; font-family: 'DM Sans', sans-serif;
      font-size: 15px; cursor: pointer; transition: all 0.15s;
    }
    .review-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Review screen */
    .review-header { margin-bottom: 24px; }
    .review-header h2 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 4px; }
    .back-btn {
      background: transparent; border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 16px; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      cursor: pointer; transition: all 0.15s; margin-bottom: 20px;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }

    .review-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 14px;
    }
    .review-item.correct-q { border-left: 3px solid var(--green); }
    .review-item.wrong-q { border-left: 3px solid var(--red); }
    .review-q-num { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .review-q-text { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 12px; }
    .review-ans {
      font-size: 13px; display: flex; align-items: flex-start; gap: 8px; margin-bottom: 4px;
    }
    .review-ans .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .dot-green { background: var(--green); }
    .dot-red { background: var(--red); }
    .review-exp { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- ── HOME ── -->
  <div class="screen active" id="homeScreen">
    <div class="home-icon">🖥️</div>
    <div class="home-title">CS <span>Quiz</span><br>Challenge</div>
    <p class="home-sub">Test karo apna Computer Science knowledge!</p>
    <div class="info-chips">
      <div class="chip">📋 <span>10</span> Questions</div>
      <div class="chip">⏱️ <span>20</span> sec each</div>
      <div class="chip">🏆 Score & Grade</div>
    </div>
    <button class="start-btn" onclick="startQuiz()">Quiz Shuru Karo 🚀</button>
  </div>

  <!-- ── QUIZ ── -->
  <div class="screen" id="quizScreen">
    <div class="quiz-header">
      <div class="q-counter">Question <span id="qNum">1</span> / 10</div>
      <div class="score-pill">Score: <b id="scorePill">0</b></div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>
    <div class="timer-row">
      <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
      <div class="timer-label" id="timerLabel">20</div>
    </div>
    <div class="cat-badge" id="catBadge"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsDiv"></div>
    <div class="explanation" id="explanation"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Agla Sawaal →</button>
  </div>

  <!-- ── RESULT ── -->
  <div class="screen" id="resultScreen">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-title" id="resultTitle"></div>
    <p class="result-sub" id="resultSub"></p>
    <div class="score-display">
      <div class="score-num" id="scoreNum" style="color:var(--accent)"></div>
      <div class="score-pct" id="scorePct"></div>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-val" id="resCorrect" style="color:var(--green)"></div>
        <div class="stat-label">Sahi</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">❌</div>
        <div class="stat-val" id="resWrong" style="color:var(--red)"></div>
        <div class="stat-label">Galat</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏩</div>
        <div class="stat-val" id="resSkipped" style="color:var(--yellow)"></div>
        <div class="stat-label">Skip</div>
      </div>
    </div>
    <div class="grade-bar">
      <span class="grade-label">Tumhara Grade</span>
      <span class="grade-val" id="gradeVal"></span>
    </div>
    <button class="replay-btn" onclick="restartQuiz()">🔄 Phir Khelna</button>
    <button class="review-btn" onclick="showReview()">📋 Answers Review Karo</button>
  </div>

  <!-- ── REVIEW ── -->
  <div class="screen" id="reviewScreen">
    <button class="back-btn" onclick="showScreen('resultScreen')">← Wapas</button>
    <div class="review-header">
      <h2>Answer Review</h2>
      <p style="font-size:13px;color:var(--muted)">Dekho kahan galti hui</p>
    </div>
    <div id="reviewList"></div>
  </div>

</div>

<script>
const questions = [
  {
    cat: "Basics",
    q: "CPU ka full form kya hai?",
    opts: ["Central Processing Unit","Computer Personal Unit","Central Printing Unit","Control Processing Unit"],
    ans: 0,
    exp: "CPU — Central Processing Unit — computer ka 'brain' hota hai jo saare calculations karta hai."
  },
  {
    cat: "Networking",
    q: "HTTP ka full form kya hai?",
    opts: ["HyperText Transfer Protocol","High Transfer Text Protocol","HyperText Transmission Process","Home Transfer Text Program"],
    ans: 0,
    exp: "HTTP (HyperText Transfer Protocol) web par data transfer karne ka standard protocol hai."
  },
  {
    cat: "Programming",
    q: "Java mein program execute hone ka sahi order kya hai?",
    opts: ["Compile → Run","Write → Link → Execute","Source Code → Bytecode → JVM Execute","Directly Machine Code mein chalti hai"],
    ans: 2,
    exp: "Java mein source code pehle bytecode mein compile hota hai, phir JVM (Java Virtual Machine) use execute karta hai."
  },
  {
    cat: "Data Structures",
    q: "Stack kis principle par kaam karta hai?",
    opts: ["FIFO","LIFO","Random Access","FILO aur FIFO dono"],
    ans: 1,
    exp: "Stack LIFO (Last In, First Out) principle follow karta hai — jo element last mein aaya, wo pehle niklega. Jaise plate ki stack."
  },
  {
    cat: "OS",
    q: "Operating System ka main kaam kya hai?",
    opts: ["Sirf internet chalana","Hardware aur Software ke beech bridge ka kaam karna","Programs likhna","Data store karna"],
    ans: 1,
    exp: "OS hardware aur software ke beech mediator ka kaam karta hai — resources manage karta hai, processes handle karta hai."
  },
  {
    cat: "Database",
    q: "SQL mein table se data nikalne ke liye kaunsa command use hota hai?",
    opts: ["GET","FETCH","SELECT","RETRIEVE"],
    ans: 2,
    exp: "SELECT command SQL mein data retrieve karne ke liye use hota hai. Jaise: SELECT * FROM students;"
  },
  {
    cat: "Binary",
    q: "Binary mein 1010 ka decimal value kya hoga?",
    opts: ["8","10","12","14"],
    ans: 1,
    exp: "1010 binary = (1×8) + (0×4) + (1×2) + (0×1) = 8+0+2+0 = 10 decimal."
  },
  {
    cat: "Networking",
    q: "IP address ka kaunsa version 32-bit hota hai?",
    opts: ["IPv6","IPv4","IPv3","IPv8"],
    ans: 1,
    exp: "IPv4 (Internet Protocol version 4) 32-bit address use karta hai jaise 192.168.1.1. IPv6 128-bit hota hai."
  },
  {
    cat: "Programming",
    q: "OOP mein 'Inheritance' ka matlab kya hai?",
    opts: ["Data chhupaana","Ek class ki properties doosri class mein use karna","Function ke andar function","Ek object ko copy karna"],
    ans: 1,
    exp: "Inheritance se ek class (child) doosri class (parent) ki properties aur methods inherit kar sakti hai. Code reuse hota hai."
  },
  {
    cat: "Memory",
    q: "RAM ka full form kya hai?",
    opts: ["Read Access Memory","Random Access Memory","Rapid Access Module","Read And Modify"],
    ans: 1,
    exp: "RAM — Random Access Memory — temporary memory hai jo computer band hone par erase ho jaati hai."
  }
];

let shuffled = [];
let current = 0;
let score = 0;
let correct = 0;
let wrong = 0;
let skipped = 0;
let answered = false;
let timerInterval = null;
let timeLeft = 20;
let userAnswers = [];

const labels = ['A','B','C','D'];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function startQuiz() {
  shuffled = shuffle(questions);
  current = 0; score = 0; correct = 0; wrong = 0; skipped = 0;
  userAnswers = [];
  showScreen('quizScreen');
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  clearInterval(timerInterval);
  timeLeft = 20;

  const q = shuffled[current];
  document.getElementById('qNum').textContent = current + 1;
  document.getElementById('scorePill').textContent = score;
  document.getElementById('progressFill').style.width = ((current + 1) / 10 * 100) + '%';
  document.getElementById('catBadge').textContent = q.cat;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('explanation').className = 'explanation';
  document.getElementById('nextBtn').className = 'next-btn';

  const optsDiv = document.getElementById('optionsDiv');
  optsDiv.innerHTML = q.opts.map((opt, i) => `
    <button class="opt-btn" onclick="selectAnswer(${i})" id="opt${i}">
      <span class="opt-label">${labels[i]}</span>
      ${opt}
    </button>
  `).join('');

  startTimer();
}

function startTimer() {
  updateTimer();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      timeOut();
    }
  }, 1000);
}

function updateTimer() {
  const fill = document.getElementById('timerFill');
  const label = document.getElementById('timerLabel');
  const pct = (timeLeft / 20 * 100) + '%';
  fill.style.width = pct;
  label.textContent = timeLeft;
  if (timeLeft <= 5) {
    fill.className = 'timer-fill danger';
    label.className = 'timer-label danger';
  } else if (timeLeft <= 10) {
    fill.className = 'timer-fill warn';
    label.className = 'timer-label';
  } else {
    fill.className = 'timer-fill';
    label.className = 'timer-label';
  }
}

function timeOut() {
  if (answered) return;
  answered = true;
  skipped++;
  userAnswers.push({ q: current, chosen: -1, correct: shuffled[current].ans });
  const q = shuffled[current];
  document.getElementById('opt' + q.ans).classList.add('correct');
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  showExplanation('⏰ Time khatam! Sahi jawab dekho.');
  document.getElementById('nextBtn').className = 'next-btn show';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  const q = shuffled[current];
  userAnswers.push({ q: current, chosen: idx, correct: q.ans });

  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  document.getElementById('opt' + q.ans).classList.add('correct');

  if (idx === q.ans) {
    score += 10; correct++;
    showExplanation('✅ Bilkul sahi! ' + q.exp);
  } else {
    document.getElementById('opt' + idx).classList.add('wrong');
    wrong++;
    showExplanation('❌ Galat. Sahi jawab: <strong>' + labels[q.ans] + '. ' + q.opts[q.ans] + '</strong>. ' + q.exp);
  }

  document.getElementById('nextBtn').className = 'next-btn show';
  document.getElementById('nextBtn').textContent = current < 9 ? 'Agla Sawaal →' : 'Result Dekho 🏆';
}

function showExplanation(msg) {
  const el = document.getElementById('explanation');
  el.innerHTML = msg;
  el.className = 'explanation show';
}

function nextQuestion() {
  current++;
  if (current >= 10) { showResult(); return; }
  loadQuestion();
}

function showResult() {
  clearInterval(timerInterval);
  const pct = Math.round(score / 100 * 100);

  let icon, title, sub, grade;
  if (pct >= 90)      { icon='🏆'; title='Exceptional!'; sub='Tum CS ke star ho!'; grade='A+ (Outstanding)'; }
  else if (pct >= 80) { icon='🎉'; title='Bahut Badhiya!'; sub='Kamaal ki performance!'; grade='A (Excellent)'; }
  else if (pct >= 70) { icon='😎'; title='Accha Kiya!'; sub='Solid performance bhai!'; grade='B (Good)'; }
  else if (pct >= 60) { icon='👍'; title='Theek Hai!'; sub='Thoda aur padhai karo.'; grade='C (Average)'; }
  else if (pct >= 40) { icon='📚'; title='Mehnat Karo!'; sub='Revision zaruri hai.'; grade='D (Needs Work)'; }
  else                { icon='😅'; title='Koshish Karte Raho!'; sub='Aaj se padhai shuru karo!'; grade='F (Keep Trying)'; }

  document.getElementById('resultIcon').textContent = icon;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = sub;
  document.getElementById('scoreNum').textContent = score + ' / 100';
  document.getElementById('scorePct').textContent = pct + '% Accuracy';
  document.getElementById('resCorrect').textContent = correct;
  document.getElementById('resWrong').textContent = wrong;
  document.getElementById('resSkipped').textContent = skipped;
  document.getElementById('gradeVal').textContent = grade;

  const gradeColor = pct>=80?'var(--green)':pct>=60?'var(--yellow)':'var(--red)';
  document.getElementById('gradeVal').style.color = gradeColor;

  showScreen('resultScreen');
}

function restartQuiz() { startQuiz(); }

function showReview() {
  const list = document.getElementById('reviewList');
  list.innerHTML = userAnswers.map((ua, i) => {
    const q = shuffled[ua.q];
    const isCorrect = ua.chosen === ua.correct;
    const chosenText = ua.chosen === -1 ? '⏰ Time Out (Skip)' : labels[ua.chosen] + '. ' + q.opts[ua.chosen];
    return `
      <div class="review-item ${isCorrect ? 'correct-q' : 'wrong-q'}">
        <div class="review-q-num">Q${i+1} • ${q.cat} ${isCorrect ? '✅' : ua.chosen===-1 ? '⏩' : '❌'}</div>
        <div class="review-q-text">${q.q}</div>
        ${!isCorrect ? `<div class="review-ans"><div class="dot dot-red"></div><span>Tumhara jawab: ${chosenText}</span></div>` : ''}
        <div class="review-ans"><div class="dot dot-green"></div><span>Sahi jawab: ${labels[ua.correct]}. ${q.opts[ua.correct]}</span></div>
        <div class="review-exp">${q.exp}</div>
      </div>`;
  }).join('');
  showScreen('reviewScreen');
}
</script>
